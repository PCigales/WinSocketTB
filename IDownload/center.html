<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8">
    <title>IDownload center</title>
    <link rel="icon" type="image/x-icon" href="icon_48.png">
    <style type="text/css">
      body {
        position: relative;
        display: flex;
        flex-flow: column nowrap;
        max-height: calc(100dvh - 10px);
        margin: 5px;
        background-color: rgb(40, 45, 50);
        color: rgb(225, 225, 225);
        font-size: 100%;
      }
      h1 {
        width: 100%;
        margin-block-start: 0.5em;
        margin-block-end: 0;
        padding-bottom: 0.5em;
        text-align: center;
        border-bottom: solid 1px rgba(255, 255, 255, 0.2);
      }
      @keyframes blink {
        0% {opacity: 0;}
        50% {opacity: 1;}
        100% {opacity: 0;}
      }
      #connected {
        position: absolute;
        left: 0.5em;
        top: 0.5em;
        font-size: 120%;
        &.not {
          animation: blink 2s ease-in-out 0s infinite normal;
        }
      }
      #filters {
        position: absolute;
        right: 1em;
        top: 1em;
        &>input[type=checkbox] {
          appearance: none;
          width: 1.2em;
          height: 1.2em;
          margin-left: 1em;
          background-color: rgb(30, 30, 35);
          color: rgb(225, 225, 225);
          border: solid 0.45em rgb(30, 30, 35);
          outline: solid 1px rgba(225, 225, 225, 0.2);
          outline-offset: -1px;
          vertical-align: middle;
          font-size: 100%;
          &:checked {
            background-color: rgb(225, 225, 225);
          }
          &:is(:hover, :focus-visible) {
            outline-color: rgba(225, 225, 225, 0.4);
          }
          &+span {
            display: inline-block;
            width: 1em;
            vertical-align: middle;
          }
          &#fworking+span {
            color: dodgerblue;
          }
          &#fcompleted+span {
            color: limegreen;
          }
          &#faborted+span {
            color: crimson;
          }
        }
        &:has(>#fworking:not(:checked))~#downloads>li.working {
          display: none;
        }
        &:has(>#fcompleted:not(:checked))~#downloads>li.completed {
          display: none;
        }
        &:has(>#faborted:not(:checked))~#downloads>li.aborted {
          display: none;
        }
      }
      #downloads {
        flex: 1 1 content;
        max-width: 100%;
        overflow-y: auto;
        @supports not (-moz-appearance:none) {
          scrollbar-color: rgb(121, 123, 126) rgb(34, 37, 43);
        }
        scrollbar-gutter: stable;
        margin: 0;
        padding-left: 2em;
        padding-right: 1.5em;
        white-space: nowrap;
      }
      #download_pattern {
        display: none;
      }
      li {
        list-style-type: square;
        line-height: 1.5em;
        padding-top: 1em;
        padding-bottom: 1em;
        border-bottom: solid 1px rgba(255, 255, 255, 0.2);
        &.working {
          list-style-type: "\1f86b\00a0\00a0";
          &::marker {
            color: dodgerblue;
          }
          &>button.discard {
            display: revert;
          }
          &:has(>div.progression>span.bar>progress:not(.no))>button.suspend {
            display: revert;
          }
        }
        &.completed {
          list-style-type: "\2714\00a0\00a0";
          &::marker {
            color: limegreen;
          }
        }
        &.aborted {
          list-style-type: "\2716\00a0\00a0";
          &::marker {
            color: crimson;
          }
          &>button.restart {
            display: revert;
          }
          &:has(>div.progression>span.bar>progress:not(.no))>button.resume {
            display: revert;
          }
        }
        &>div {
          position: relative;
          width: 100%;
          white-space: pre;
          word-break: keep-all;
          &::before {
            content: attr(class)": ";
            display: inline-block;
            width: 7em;
            text-transform: capitalize;
          }
          &:is(.size, .downloaded, .status, .estimation) {
            display: inline-block;
            width: 50%;
          }
          &:not(.progression)>span {
            position: absolute;
            display: inline-block;
            width: calc(100% - 7.5em);
            overflow: auto;
            scrollbar-width: none;
            &:is(.size, .downloaded) {
              &:not(:empty)::after {
                content: " o";
              }
              &:empty::after {
                content: "?";
              }
            }
          }
          &.progression {
            &:has(>span.percent:empty) {
              display: none;
            }
            &>span.bar {
              display: inline-flex;
              flex-flow: row nowrap;
              justify-content: flex-start;
              align-items: center;
              align-content: center;
              width: max(10em, 100% - 10.2em);
              vertical-align: -0.2em;
              &:empty {
                display: none;
              }
              &>progress {
                min-width: 0;
                max-width: none;
                accent-color: #0060df;
              }
            }
            &>span.percent::after {
              content: " %";
            }
            &>span.bar:not(:empty)+span.percent {
              display: inline-block;
              width: 3.2em;
              text-align: right;
            }
          }
          &.estimation:has(>span:empty) {
            display: none;
          }
        }
        &>button {
          width: 5em;
          height: 1.7em;
          margin-top: 0.5em;
          margin-right: 1em;
          border: none;
          background-color: rgb(30, 30, 35);
          color: inherit;
          cursor: pointer;
          &:not(.explorer) {
            display: none;
          }
        }
      }
    </style>
  </head>
  <body>
    <h1>IDownload center</h1>
    <div id="connected" class="not">&udarr;</div>
    <div id="filters"><input id="fworking" type="checkbox" checked autocomplete="off"><span>&#x1f86b;</span><input id="fcompleted" type="checkbox" checked autocomplete="off"><span>&#x2714;</span><input id="faborted" type="checkbox" checked autocomplete="off"><span>&#x2716;</span></div>
    <ul id="downloads">
      <li id="download_pattern">
        <div class="url"><span class="url"></span></div>
        <div class="file"><span class="file"></span></div>
        <div class="status"><span class="status"></span></div><div class="estimation"><span class="estimation"></span></div><br>
        <div class="size"><span class="size"></span></div><div class="downloaded"><span class="downloaded"></span></div><br>
        <div class="progression"><span class="bar"></span><span class="percent"></span></div>
        <button class="explorer">Explorer</button><button class="discard">Discard</button><button class="restart">Restart</button><button class="suspend">Suspend</button><button class="resume">Resume</button>
      </li>
    </ul>
    <script src="center.js"></script>
  </body>
</html>
